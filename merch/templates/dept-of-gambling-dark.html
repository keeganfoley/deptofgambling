<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700;800&family=Cinzel:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .design {
    width: 1800px;
    background: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 80px 0;
    gap: 60px;
  }
  .title {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 148px;
    color: #ffffff;
    text-align: center;
    letter-spacing: 18px;
    text-transform: uppercase;
    line-height: 1.1;
    -webkit-font-smoothing: antialiased;
  }
  .seal {
    width: 700px;
  }
  .seal img {
    width: 100%;
    height: auto;
    display: block;
  }
  .subtitle {
    font-family: 'Cinzel', serif;
    font-weight: 500;
    font-size: 64px;
    color: #cccccc;
    text-align: center;
    letter-spacing: 14px;
    text-transform: uppercase;
    -webkit-font-smoothing: antialiased;
  }
</style>
</head>
<body>
  <div class="design">
    <div class="title">Department<br>of Gambling</div>
    <div class="seal">
      <img src="/Users/keeganfoley/Department of Gambling/public/logo.png" alt="DOG Seal">
    </div>
    <div class="subtitle">Office of Odds & Wagers</div>
  </div>
</body>
</html>
