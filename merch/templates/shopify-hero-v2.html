<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 1920px;
    height: 720px;
  }
  .hero {
    width: 1920px;
    height: 720px;
    background: linear-gradient(135deg, #0a0a0a 0%, #141414 30%, #0d0d0d 60%, #111 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    position: relative;
    overflow: hidden;
  }
  /* Subtle radial glow behind logo */
  .hero::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(218,165,32,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  /* Gold accent line at top */
  .top-accent {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(to right, transparent 10%, #b8860b 30%, #daa520 50%, #b8860b 70%, transparent 90%);
  }
  /* Gold accent line at bottom */
  .bottom-accent {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(to right, transparent 10%, #b8860b 30%, #daa520 50%, #b8860b 70%, transparent 90%);
  }
  .logo-container {
    position: relative;
    z-index: 2;
  }
  .logo-container img {
    width: 420px;
    height: auto;
    display: block;
    filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));
  }
  .text-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    position: relative;
    z-index: 2;
  }
  .headline {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 42px;
    color: #ffffff;
    letter-spacing: 6px;
    text-transform: uppercase;
    text-align: center;
  }
  .shop-btn {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 16px;
    color: #0a0a0a;
    background: linear-gradient(135deg, #daa520, #b8860b);
    padding: 14px 48px;
    border-radius: 4px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    display: inline-block;
  }
  /* Subtle corner decorations */
  .corner {
    position: absolute;
    width: 60px;
    height: 60px;
    z-index: 1;
  }
  .corner-tl { top: 20px; left: 20px; border-top: 1px solid rgba(184,134,11,0.3); border-left: 1px solid rgba(184,134,11,0.3); }
  .corner-tr { top: 20px; right: 20px; border-top: 1px solid rgba(184,134,11,0.3); border-right: 1px solid rgba(184,134,11,0.3); }
  .corner-bl { bottom: 20px; left: 20px; border-bottom: 1px solid rgba(184,134,11,0.3); border-left: 1px solid rgba(184,134,11,0.3); }
  .corner-br { bottom: 20px; right: 20px; border-bottom: 1px solid rgba(184,134,11,0.3); border-right: 1px solid rgba(184,134,11,0.3); }
</style>
</head>
<body>
  <div class="hero">
    <div class="top-accent"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="logo-container">
      <img src="/Users/keeganfoley/Downloads/ChatGPT Image Mar 5, 2026, 10_24_11 AM.png">
    </div>

    <div class="text-section">
      <div class="headline">Browse Our Latest Products</div>
      <a class="shop-btn" href="#">Shop All</a>
    </div>

    <div class="bottom-accent"></div>
  </div>
</body>
</html>
