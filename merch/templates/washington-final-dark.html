<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .design {
    width: 1800px;
    background: transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .portrait {
    width: 1000px;
  }
  .portrait img {
    width: 100%;
    height: auto;
    display: block;
  }
  .text-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    margin-top: -310px;
  }
  .quote {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-style: italic;
    font-size: 156px;
    color: #ffffff;
    text-align: center;
    line-height: 1.15;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .attribution {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 64px;
    color: #cccccc;
    letter-spacing: 6px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
</style>
</head>
<body>
  <div class="design">
    <div class="portrait">
      <img src="../portraits/washington-portrait.png" alt="Washington Portrait">
    </div>
    <div class="text-block">
      <div class="quote">"Always Split Eights"</div>
      <div class="attribution">— George Washington</div>
    </div>
  </div>
</body>
</html>
