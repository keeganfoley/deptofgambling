<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 1080px;
    height: 920px;
  }
  .hero {
    width: 1080px;
    height: 920px;
    background: linear-gradient(135deg, #0a0a0a 0%, #111 35%, #0d0d0d 65%, #0a0a0a 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .top-line {
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(to right, transparent 5%, #b8860b 25%, #daa520 50%, #b8860b 75%, transparent 95%);
  }
  .bottom-line {
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(to right, transparent 5%, #b8860b 25%, #daa520 50%, #b8860b 75%, transparent 95%);
  }
  .corner { position: absolute; width: 40px; height: 40px; z-index: 1; }
  .corner-tl { top: 14px; left: 14px; border-top: 1px solid rgba(218,165,32,0.3); border-left: 1px solid rgba(218,165,32,0.3); }
  .corner-tr { top: 14px; right: 14px; border-top: 1px solid rgba(218,165,32,0.3); border-right: 1px solid rgba(218,165,32,0.3); }
  .corner-bl { bottom: 14px; left: 14px; border-bottom: 1px solid rgba(218,165,32,0.3); border-left: 1px solid rgba(218,165,32,0.3); }
  .corner-br { bottom: 14px; right: 14px; border-bottom: 1px solid rgba(218,165,32,0.3); border-right: 1px solid rgba(218,165,32,0.3); }
  .main-logo {
    position: relative; z-index: 2;
    width: 420px;
    height: 280px;
    overflow: hidden;
    margin-bottom: -10px;
  }
  .main-logo img {
    width: 420px; height: auto; display: block;
    margin-top: -40px;
    filter: drop-shadow(0 6px 30px rgba(0,0,0,0.5));
  }
  .logos-row {
    display: flex;
    align-items: center;
    gap: 20px;
    position: relative;
    z-index: 2;
  }
  .divider-h {
    width: 2px; height: 50px;
    background: linear-gradient(to bottom, transparent, #c9941a, #daa520, #c9941a, transparent);
  }
  .seal img {
    width: 50px; height: 50px; display: block;
    filter: drop-shadow(0 2px 8px rgba(218,165,32,0.25));
  }
  .seal-label {
    font-family: 'Inter', sans-serif; font-weight: 400; font-size: 16px;
    color: #daa520; letter-spacing: 6px; text-transform: uppercase;
  }
  .text-section {
    display: flex; flex-direction: column; align-items: center;
    gap: 12px; position: relative; z-index: 2;
    margin-top: 4px;
  }
  .headline {
    font-family: 'Cinzel', serif; font-weight: 700; font-size: 72px;
    color: #ffffff; letter-spacing: 5px; text-transform: uppercase;
    text-align: center; line-height: 1.15;
  }
  .sub {
    font-family: 'Inter', sans-serif; font-weight: 300; font-size: 22px;
    color: #999; letter-spacing: 5px; text-transform: uppercase;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="hero">
    <div class="top-line"></div>
    <div class="bottom-line"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="main-logo">
      <img src="/Users/keeganfoley/Downloads/ChatGPT Image Mar 5, 2026, 10_24_11 AM.png">
    </div>

    <div class="logos-row">
      <div class="seal">
        <img src="/Users/keeganfoley/Downloads/gambling_logo_transparent_fixed.png">
      </div>
      <div class="divider-h"></div>
      <div class="seal-label">Department of Gambling</div>
    </div>

    <div class="text-section">
      <div class="headline">Browse Our<br>Latest Products</div>
      <div class="sub">Official Merch Collection</div>
    </div>
  </div>
</body>
</html>
