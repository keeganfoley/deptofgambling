<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 1920px;
    height: 720px;
  }
  .hero {
    width: 1920px;
    height: 720px;
    background: linear-gradient(135deg, #0a0a0a 0%, #111 35%, #0d0d0d 65%, #0a0a0a 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 700px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(218,165,32,0.04) 0%, transparent 65%);
    pointer-events: none;
  }
  .top-line {
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(to right, transparent 10%, #b8860b 30%, #daa520 50%, #b8860b 70%, transparent 90%);
  }
  .bottom-line {
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(to right, transparent 10%, #b8860b 30%, #daa520 50%, #b8860b 70%, transparent 90%);
  }
  .logos {
    display: flex;
    align-items: center;
    gap: 50px;
    position: relative;
    z-index: 2;
  }
  .main-logo img {
    width: 400px;
    height: auto;
    display: block;
    filter: drop-shadow(0 6px 30px rgba(0,0,0,0.5));
  }
  .divider {
    width: 2px;
    height: 200px;
    background: linear-gradient(to bottom, transparent, #b8860b, #daa520, #b8860b, transparent);
    flex-shrink: 0;
  }
  .seal img {
    width: 160px;
    height: 160px;
    display: block;
    filter: drop-shadow(0 2px 12px rgba(184,134,11,0.2));
  }
  .text-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    position: relative;
    z-index: 2;
  }
  .headline {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 56px;
    color: #ffffff;
    letter-spacing: 8px;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.15;
  }
  .sub {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 18px;
    color: #b8860b;
    letter-spacing: 8px;
    text-transform: uppercase;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="hero">
    <div class="top-line"></div>
    <div class="bottom-line"></div>

    <div class="logos">
      <div class="main-logo">
        <img src="/Users/keeganfoley/Downloads/ChatGPT Image Mar 5, 2026, 10_24_11 AM.png">
      </div>
      <div class="divider"></div>
      <div class="seal">
        <img src="/Users/keeganfoley/Downloads/gambling_logo_transparent_fixed.png">
      </div>
    </div>

    <div class="text-section">
      <div class="headline">Browse Our Latest Products</div>
      <div class="sub">Department of Gambling — Official Merch</div>
    </div>
  </div>
</body>
</html>
