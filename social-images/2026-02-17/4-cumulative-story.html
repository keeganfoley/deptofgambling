    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1080px;
      height: 1920px;
      background: #0b0e11;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: white;
      padding: 140px 50px 30px 50px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 30px;
    }

    .title {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: 3px;
      color: #E8B84A;
    }

    .day-section {
      text-align: right;
    }

    .day-badge {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }

    .date {
      font-size: 26px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
    }

    .balance-section {
      margin-bottom: 30px;
    }

    .balance-label {
      font-size: 18px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 3px;
      margin-bottom: 10px;
    }

    .balance-row {
      display: flex;
      align-items: baseline;
      gap: 20px;
    }

    .balance {
      font-size: 72px;
      font-weight: 800;
      color: white;
    }

    .balance-change {
      font-size: 32px;
      font-weight: 700;
      color: #22c55e;
    }

    .balance-pct {
      font-size: 32px;
      font-weight: 700;
      color: #22c55e;
    }

    .stats-row {
      display: flex;
      gap: 80px;
      margin-bottom: 25px;
      padding-bottom: 25px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-label {
      font-size: 16px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 42px;
      font-weight: 700;
    }

    .stat-value.green {
      color: #22c55e;
    }

    .stat-value.red {
      color: #ef4444;
    }

    .stat-value.white {
      color: #ffffff;
    }

    .chart-container {
      background: #0b0e11;
      padding: 0;
    }

    .footer {
      display: flex;
      justify-content: center;
      margin-top: 15px;
    }

    .website {
      font-size: 16px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 2px;
    }
  </style>
</head>
