<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Picks Results - MARCH 25</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; }

    .container {
      width: 1080px;
      height: 1350px;
      padding: 40px 45px 100px;
      position: relative;
      background: linear-gradient(180deg, #4a7cb8 0%, #3a5a8a 50%, #1a2d4a 100%);
      display: flex;
      flex-direction: column;
    }

    .grid-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.10) 1px, transparent 1px);
      background-size: 45px 45px;
    }

    .side-bars {
      position: absolute;
      top: 80px; bottom: 80px;
      width: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .side-bars.left { left: 12px; }
    .side-bars.right { right: 12px; }
    .side-bar { width: 100%; height: 40px; border-radius: 6px; opacity: 0.6; }
    .side-bar.green { background: #2d8a4e; }
    .side-bar.red { background: #c0392b; }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .header { text-align: center; margin-bottom: 10px; }
    .header-label {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 10px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 4px;
    }
    .date {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 5px;
      color: #fbbf24;
      text-decoration: underline;
      text-underline-offset: 10px;
      text-decoration-thickness: 4px;
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 12px;
    }
    .side-stat {
      text-align: center;
      background: rgba(30, 41, 59, 0.8);
      border-radius: 12px;
      padding: 10px 24px;
      border: 2px solid rgba(34,197,94,0.6);
      min-width: 110px;
    }
    .side-stat-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 4px;
    }
    .side-stat-value {
      font-size: 36px;
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      color: #22c55e;
    }
    .big-profit-box {
      background: rgba(15, 30, 50, 0.95);
      border-radius: 16px;
      padding: 12px 45px 16px;
      border: 4px solid #22c55e;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    }
    .big-profit-label {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 5px;
      color: #22c55e;
      text-align: center;
      margin-bottom: 2px;
    }
    .big-profit {
      font-size: 70px;
      font-weight: 900;
      font-family: 'JetBrains Mono', monospace;
      color: #22c55e;
      line-height: 1;
    }

    .results-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      justify-content: space-between;
      margin-top: 8px;
    }

    .result-row {
      display: flex;
      align-items: center;
      background: rgba(30, 41, 59, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 14px;
      padding: 10px 18px;
      border: 3px solid;
      gap: 14px;
      flex: 1;
      max-height: 120px;
    }
    .result-row.win { border-color: #22c55e; box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3); }
    .result-row.loss { border-color: #ef4444; box-shadow: 0 4px 20px rgba(239, 68, 68, 0.3); }

    .team-logo {
      width: 85px;
      height: 85px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .team-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .team-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .team-name {
      font-size: 38px;
      font-weight: 900;
      color: white;
      line-height: 1;
      letter-spacing: 2px;
    }
    .team-line {
      font-size: 22px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.7);
    }

    .fund-badge {
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 2px;
      color: white;
    }
    .fund-badge.sharp { background: rgba(34, 197, 94, 0.35); border: 2px solid #22c55e; }
    .fund-badge.vector { background: rgba(156, 163, 175, 0.35); border: 2px solid #9ca3af; }
    .fund-badge.catalyst { background: rgba(192, 132, 252, 0.35); border: 2px solid #c084fc; }

    .profit-amount {
      font-size: 34px;
      font-weight: 900;
      font-family: 'JetBrains Mono', monospace;
      text-align: center;
      min-width: 110px;
    }
    .profit-amount.profit-positive { color: #22c55e; }
    .profit-amount.profit-negative { color: #ef4444; }

    .sport-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 1px 0;
      flex-shrink: 0;
    }
    .sport-divider::before,
    .sport-divider::after {
      content: '';
      flex: 1;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(251,191,36,0.4), transparent);
    }
    .sport-label {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 5px;
      color: #fbbf24;
      padding: 4px 12px;
      background: rgba(251, 191, 36, 0.15);
      border: 2px solid rgba(251,191,36,0.4);
      border-radius: 8px;
    }

    .result-icon {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 900;
      color: white;
      flex-shrink: 0;
    }
    .result-icon.win {
      background: linear-gradient(135deg, #2d8a4e 0%, #22c55e 100%);
      box-shadow: 0 6px 20px rgba(34, 197, 94, 0.5);
    }
    .result-icon.loss {
      background: linear-gradient(135deg, #c0392b 0%, #ef4444 100%);
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.5);
    }

    .footer {
      position: absolute;
      bottom: 14px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 10;
    }
    .logo { width: 45px; height: 45px; margin: 0 auto 5px; }
    .logo img { width: 100%; height: 100%; object-fit: contain; }
    .website { font-size: 13px; font-weight: 700; letter-spacing: 6px; color: white; }
  </style>
</head>
<body>

        <!-- NCAAB -->
        <div class="sport-divider"><span class="sport-label">NCAAB</span></div>

        <div class="result-row win">

        <!-- NHL -->

      </div>

    </div>

    <div class="footer">
      <div class="logo"><img src="https://deptofgambling.com/logo.png" alt="DoG"></div>
      <div class="website">DEPTOFGAMBLING.COM</div>
    </div>
  </div>
</body>
</html>
