<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Department of Gambling - Managing Partners</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; }

    .container {
      width: 1080px;
      height: 1350px;
      position: relative;
      background: linear-gradient(180deg, #0a1628 0%, #0d1f3c 50%, #061224 100%);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .grid-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(251,191,36,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(251,191,36,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .corner-accent {
      position: absolute;
      width: 110px;
      height: 110px;
      border: 3px solid rgba(251,191,36,0.25);
      z-index: 2;
    }
    .corner-accent.tl { top: 16px; left: 16px; border-right: none; border-bottom: none; }
    .corner-accent.tr { top: 16px; right: 16px; border-left: none; border-bottom: none; }
    .corner-accent.bl { bottom: 16px; left: 16px; border-right: none; border-top: none; }
    .corner-accent.br { bottom: 16px; right: 16px; border-left: none; border-top: none; }

    /* Financial background */
    .candles-bg {
      position: absolute;
      bottom: 40px; left: 0; right: 0;
      height: 420px; opacity: 0.04;
      display: flex; align-items: flex-end; justify-content: center;
      gap: 15px; padding: 0 35px;
    }
    .candle { display: flex; flex-direction: column; align-items: center; }
    .wick { width: 3px; border-radius: 2px; }
    .cb { width: 14px; border-radius: 3px; }
    .candle.g .wick, .candle.g .cb { background: #22c55e; }
    .candle.r .wick, .candle.r .cb { background: #dc2626; }

    .volume-bg {
      position: absolute;
      bottom: 20px; left: 0; right: 0;
      height: 60px; opacity: 0.035;
      display: flex; align-items: flex-end; justify-content: center;
      gap: 13px; padding: 0 35px 10px;
    }
    .vb { width: 11px; border-radius: 2px 2px 0 0; }
    .vb.g { background: #22c55e; }
    .vb.r { background: #dc2626; }

    .content {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 48px 26px;
    }

    /* ===== HEADER ===== */
    .header-section {
      text-align: center;
      width: 100%;
      margin-bottom: 16px;
    }
    .logo-container { margin-bottom: 10px; }
    .logo-container img {
      width: 100px; height: 100px;
      filter: drop-shadow(0 0 30px rgba(251,191,36,0.35));
    }
    .dept-name {
      font-size: 22px; font-weight: 700;
      letter-spacing: 14px; color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }
    .dept-tagline {
      font-size: 34px; font-weight: 900;
      letter-spacing: 5px; color: #fbbf24;
      text-shadow: 0 0 25px rgba(251,191,36,0.3);
      line-height: 1.1;
    }

    /* ===== DIVIDER + BADGE ===== */
    .divider-badge {
      display: flex; align-items: center; justify-content: center;
      gap: 20px; width: 100%;
      margin: 16px 0 20px;
    }
    .divider-badge::before, .divider-badge::after {
      content: ''; height: 2px; flex: 1;
      background: linear-gradient(90deg, transparent, rgba(251,191,36,0.45));
    }
    .divider-badge::after {
      background: linear-gradient(90deg, rgba(251,191,36,0.45), transparent);
    }
    .badge {
      background: linear-gradient(135deg, rgba(251,191,36,0.2), rgba(251,191,36,0.06));
      border: 2px solid rgba(251,191,36,0.5);
      padding: 12px 44px; border-radius: 8px;
      box-shadow: 0 0 30px rgba(251,191,36,0.12);
    }
    .badge-text {
      font-size: 22px; font-weight: 800;
      letter-spacing: 8px; color: #fbbf24;
    }

    /* ===== HEADSHOTS ===== */
    .headshots {
      display: flex;
      gap: 40px;
      justify-content: center;
      margin-bottom: 22px;
    }

    .person { display: flex; flex-direction: column; align-items: center; }

    .headshot-frame {
      width: 440px; height: 540px;
      border-radius: 18px;
      border: 3px solid rgba(251,191,36,0.55);
      overflow: hidden;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.5),
        0 0 50px rgba(251,191,36,0.1);
      margin-bottom: 20px;
      position: relative;
    }
    .headshot-frame::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(6,18,36,0.85) 100%);
      pointer-events: none;
    }
    .headshot-frame img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
    }

    .person-name {
      font-size: 38px; font-weight: 900;
      color: white; letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 0;
      text-shadow: 0 2px 10px rgba(0,0,0,0.4);
      padding-bottom: 10px;
      border-bottom: 2px solid rgba(251,191,36,0.35);
    }

    /* ===== MINI DIVIDER ===== */
    .mini-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: 60%;
      margin: 4px auto 10px;
    }
    .mini-divider::before, .mini-divider::after {
      content: ''; height: 1px; flex: 1;
      background: linear-gradient(90deg, transparent, rgba(251,191,36,0.2));
    }
    .mini-divider::after {
      background: linear-gradient(90deg, rgba(251,191,36,0.2), transparent);
    }
    .mini-diamond {
      width: 8px; height: 8px;
      background: rgba(251,191,36,0.4);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* ===== SYNETIC STRIP ===== */
    .synetic-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      width: 100%;
      margin-bottom: 12px;
      padding: 6px 0;
    }
    .synetic-strip::before, .synetic-strip::after {
      content: '';
      height: 1.5px; flex: 1;
      background: linear-gradient(90deg, transparent, rgba(251,191,36,0.35));
    }
    .synetic-strip::after {
      background: linear-gradient(90deg, rgba(251,191,36,0.35), transparent);
    }
    .synetic-inner {
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
      flex-shrink: 0;
      position: relative;
    }
    .synetic-inner::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -40%);
      width: 320px; height: 120px;
      background: radial-gradient(ellipse, rgba(251,191,36,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .synetic-label {
      font-size: 16px; font-weight: 800;
      letter-spacing: 8px; color: rgba(251,191,36,0.55);
      text-transform: uppercase;
      position: relative;
    }
    .synetic-logo-img {
      height: 85px;
      object-fit: contain;
      display: block;
      position: relative;
      filter: brightness(1.15) drop-shadow(0 0 20px rgba(251,191,36,0.12));
    }

    /* ===== STATS BAR ===== */
    .stats-bar {
      display: flex; width: 100%;
      background: rgba(30, 41, 59, 0.55);
      border: 2px solid rgba(251,191,36,0.3);
      border-radius: 16px;
      overflow: hidden;
      margin-top: 10px;
    }
    .stat-col {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 22px 16px;
    }
    .stat-col:not(:last-child) {
      border-right: 1px solid rgba(251,191,36,0.15);
    }
    .stat-value {
      font-size: 40px; font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      color: #fbbf24; line-height: 1;
    }
    .stat-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.45);
      margin-top: 8px;
    }

    /* ===== FOOTER ===== */
    .footer {
      width: 100%;
      padding-top: 14px; margin-top: 16px;
      border-top: 1px solid rgba(251,191,36,0.12);
      display: flex; flex-direction: column;
      align-items: center; gap: 6px;
    }
    .footer-center {
      font-size: 24px; font-weight: 700;
      letter-spacing: 8px; color: rgba(255,255,255,0.55);
    }
    .footer-est {
      font-size: 16px; font-weight: 600;
      letter-spacing: 6px; color: rgba(255,255,255,0.3);
    }
    .footer-handle {
      font-size: 14px; font-weight: 600;
      letter-spacing: 3px; color: rgba(251,191,36,0.4);
    }
  </style>
</head>
