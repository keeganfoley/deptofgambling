<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio Performance - MARCH 10</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; }

    .container {
      width: 1080px;
      height: 1350px;
      padding: 50px 60px;
      position: relative;
      background: linear-gradient(180deg, #4a7cb8 0%, #3a5a8a 50%, #1a2d4a 100%);
      display: flex;
      flex-direction: column;
    }

    .grid-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 45px 45px;
    }

    .side-bars {
      position: absolute;
      top: 100px; bottom: 100px;
      width: 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .side-bars.left { left: 20px; }
    .side-bars.right { right: 20px; }
    .side-bar { width: 100%; height: 40px; border-radius: 4px; opacity: 0.5; }
    .side-bar.green { background: #2d8a4e; }
    .side-bar.red { background: #c0392b; }

    .content {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding-bottom: 120px;
    }

    .header { text-align: center; margin-bottom: 20px; }
    .header-label {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 10px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 6px;
    }
    .header-date {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 4px;
      color: #fbbf24;
      text-decoration: underline;
      text-underline-offset: 10px;
      text-decoration-thickness: 4px;
    }

    .stats-box {
      width: 95%;
      margin: 0 auto 25px;
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(251, 191, 36, 0.4);
      border-radius: 16px;
      padding: 25px 30px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.3);
    }

    .stats-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
    }
    .stats-row + .stats-row {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .stat-item { text-align: center; min-width: 180px; }
    .stat-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 38px;
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
    }
    .stat-value.white { color: white; }
    .stat-value.green { color: #22c55e; }

    .stat-divider {
      width: 1px;
      height: 45px;
      background: rgba(255,255,255,0.15);
    }

    .chart-header {
      text-align: center;
      margin-bottom: 10px;
    }
    .chart-label {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 5px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 5px;
    }
    .chart-date-range {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 3px;
      color: #fbbf24;
    }

    .chart-container {
      margin: 0 10px;
      height: 680px;
    }

    .chart-area {
      position: relative;
      background: #0d1117;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.15);
      overflow: visible;
      height: 620px;
      margin-bottom: 40px;
    }

    .y-axis-label {
      position: absolute;
      left: 12px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.8);
      transform: translateY(50%);
    }

    .h-grid-line {
      position: absolute;
      left: 70px;
      right: 15px;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    .trend-line {
      position: absolute;
      left: 75px;
      right: 20px;
      bottom: 40px;
      top: 40px;
      z-index: 1;
    }
    .trend-line svg {
      width: 100%;
      height: 100%;
    }

    .candlesticks {
      position: absolute;
      left: 75px;
      right: 20px;
      bottom: 40px;
      top: 40px;
      display: flex;
      justify-content: space-around;
      align-items: flex-end;
      z-index: 5;
    }

    .candle-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100px;
      position: relative;
      height: 100%;
    }

    .candle {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .body {
      width: 55px;
      border-radius: 4px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      min-height: 10px;
    }
    .body.green {
      background: linear-gradient(180deg, #3fb950 0%, #2d8a4e 100%);
      box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
    }
    .body.red {
      background: linear-gradient(180deg, #f85149 0%, #c0392b 100%);
      box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
    }

    .pl-label {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 15px;
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
      z-index: 10;
      padding: 4px 8px;
      border-radius: 6px;
    }
    .pl-label.positive {
      color: #22c55e;
      background: rgba(34, 197, 94, 0.2);
    }
    .pl-label.negative {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.2);
    }

    .candle-date {
      position: absolute;
      bottom: -35px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.9);
    }

    .footer {
      position: absolute;
      bottom: 25px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 10;
    }
    .logo { width: 70px; height: 70px; margin: 0 auto 15px; }
    .logo img { width: 100%; height: 100%; object-fit: contain; }
    .website { font-size: 16px; font-weight: 700; letter-spacing: 5px; color: white; }
  </style>
</head>
<body>
  <div class="container">
    <div class="grid-bg"></div>

    <!--
      7-day window: Mar 4 - Mar 10
      5 green days (Mar 4, 5, 9, 10 green; Mar 6, 8 red; Mar 4 big green)
      Actually: Mar 4 green, Mar 5 green, Mar 6 red, Mar 8 red, Mar 9 green, Mar 10 green = 4 green 2 red
    -->
    <div class="side-bars left">
      <div class="side-bar green"></div><div class="side-bar green"></div><div class="side-bar green"></div><div class="side-bar green"></div><div class="side-bar red"></div><div class="side-bar red"></div>
    </div>
    <div class="side-bars right">
      <div class="side-bar green"></div><div class="side-bar green"></div><div class="side-bar green"></div><div class="side-bar green"></div><div class="side-bar red"></div><div class="side-bar red"></div>
    </div>

    <div class="content">
      <div class="header">
        <div class="header-label">PORTFOLIO PERFORMANCE</div>
        <div class="header-date">MARCH 10</div>
      </div>

      <div class="stats-box">
        <div class="stats-row">
          <div class="stat-item">
            <div class="stat-label">BALANCE</div>
            <div class="stat-value white">$45,013</div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <div class="stat-label">NET P/L</div>
            <div class="stat-value green">+$5,013</div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <div class="stat-label">ROI</div>
            <div class="stat-value green">+12.53%</div>
          </div>
        </div>
        <div class="stats-row">
          <div class="stat-item">
            <div class="stat-label">RECORD</div>
            <div class="stat-value white">400-342</div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <div class="stat-label">WIN RATE</div>
            <div class="stat-value green">53.91%</div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <div class="stat-label">UNITS PROFITED</div>
            <div class="stat-value green">+50.13U</div>
          </div>
        </div>
      </div>

      <!--
        Chart data (6 days: Mar 4 - Mar 10):
        Range: $44,700 to $45,400 = $700
        Scale: 540px / $700 = 0.771 px per dollar
        Base: $44,700

        Mar 4: open $44,745.82 -> 35px; close $45,216.38 -> 398px; GREEN, height: 363px; P/L: +$471
        Mar 5: open $45,216.38 -> 398px; close $45,290.19 -> 455px; GREEN, height: 57px; P/L: +$74
        Mar 6: open $45,290.19 -> 455px; close $45,176.34 -> 367px; RED, body bottom: 367px, height: 88px; P/L: -$114
        Mar 8: open $45,176.34 -> 367px; close $44,855.08 -> 120px; RED, body bottom: 120px, height: 247px; P/L: -$321
        Mar 9: open $44,855.08 -> 120px; close $44,925.97 -> 174px; GREEN, height: 54px; P/L: +$71
        Mar 10: open $44,925.97 -> 174px; close $45,012.76 -> 241px; GREEN, height: 67px; P/L: +$87

        SVG Y (inverted from 540):
        Mar 4 close: 540 - 398 = 142
        Mar 5 close: 540 - 455 = 85
        Mar 6 close: 540 - 367 = 173
        Mar 8 close: 540 - 120 = 420
        Mar 9 close: 540 - 174 = 366
        Mar 10 close: 540 - 241 = 299
      -->
      <div class="chart-header">
        <div class="chart-label">7 DAY PERFORMANCE</div>
        <div class="chart-date-range">MAR 4 - MAR 10</div>
      </div>

      <div class="chart-container">
        <div class="chart-area">
          <!-- Y-Axis Labels -->
          <div class="y-axis-label" style="bottom: 0px;">$44.7k</div>
          <div class="h-grid-line" style="bottom: 5px;"></div>
          <div class="y-axis-label" style="bottom: 270px;">$45.05k</div>
          <div class="h-grid-line" style="bottom: 275px;"></div>
          <div class="y-axis-label" style="bottom: 540px;">$45.4k</div>
          <div class="h-grid-line" style="bottom: 545px;"></div>

          <!-- Trend line -->
          <div class="trend-line">
            <svg viewBox="0 0 845 540" preserveAspectRatio="none">
              <defs>
                <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.20" />
                  <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.02" />
                </linearGradient>
              </defs>
              <polygon fill="url(#areaGrad)" points="70,142 211,85 352,173 493,420 634,366 775,299 775,540 70,540" />
              <polyline fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" points="70,142 211,85" />
              <polyline fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" points="211,85 352,173 493,420" />
              <polyline fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" points="493,420 634,366 775,299" />
            </svg>
          </div>

          <div class="candlesticks">
            <!-- Mar 4: GREEN (+$471) -->
            <div class="candle-wrapper">
              <div class="candle">
                <div class="body green" style="bottom: 35px; height: 363px;"></div>
                <div class="pl-label positive" style="bottom: 412px;">+$471</div>
              </div>
              <div class="candle-date">3/4</div>
            </div>

            <!-- Mar 5: GREEN (+$74) -->
            <div class="candle-wrapper">
              <div class="candle">
                <div class="body green" style="bottom: 398px; height: 57px;"></div>
                <div class="pl-label positive" style="bottom: 469px;">+$74</div>
              </div>
              <div class="candle-date">3/5</div>
            </div>

            <!-- Mar 6: RED (-$114) -->
            <div class="candle-wrapper">
              <div class="candle">
                <div class="body red" style="bottom: 367px; height: 88px;"></div>
                <div class="pl-label negative" style="bottom: 343px;">-$114</div>
              </div>
              <div class="candle-date">3/6</div>
            </div>

            <!-- Mar 8: RED (-$321) -->
            <div class="candle-wrapper">
              <div class="candle">
                <div class="body red" style="bottom: 120px; height: 247px;"></div>
                <div class="pl-label negative" style="bottom: 96px;">-$321</div>
              </div>
              <div class="candle-date">3/8</div>
            </div>

            <!-- Mar 9: GREEN (+$71) -->
            <div class="candle-wrapper">
              <div class="candle">
                <div class="body green" style="bottom: 120px; height: 54px;"></div>
                <div class="pl-label positive" style="bottom: 188px;">+$71</div>
              </div>
              <div class="candle-date">3/9</div>
            </div>

            <!-- Mar 10: GREEN (+$87) -->
            <div class="candle-wrapper">
              <div class="candle">
                <div class="body green" style="bottom: 174px; height: 67px;"></div>
                <div class="pl-label positive" style="bottom: 255px;">+$87</div>
              </div>
              <div class="candle-date">3/10</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="logo"><img src="https://deptofgambling.com/logo.png" alt="DoG"></div>
      <div class="website">DEPTOFGAMBLING.COM</div>
    </div>
  </div>
</body>
</html>
