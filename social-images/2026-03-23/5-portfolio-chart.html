<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio Performance - MARCH 23</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; }

    .container {
      width: 1080px; height: 1350px; padding: 50px 60px;
      position: relative;
      background: linear-gradient(180deg, #4a7cb8 0%, #3a5a8a 50%, #1a2d4a 100%);
      display: flex; flex-direction: column; overflow: hidden;
    }

    .grid-bg {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 45px 45px;
    }

    .side-bars {
      position: absolute; top: 100px; bottom: 100px; width: 10px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .side-bars.left { left: 20px; }
    .side-bars.right { right: 20px; }
    .side-bar { width: 100%; height: 40px; border-radius: 4px; opacity: 0.5; }
    .side-bar.green { background: #2d8a4e; }
    .side-bar.red { background: #c0392b; }

    .content { position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; padding-bottom: 120px; }

    .header { text-align: center; margin-bottom: 16px; }
    .header-date {
      font-size: 52px; font-weight: 900; letter-spacing: 4px;
      color: #fbbf24;
      text-decoration: underline;
      text-underline-offset: 10px;
      text-decoration-thickness: 4px;
    }

    .stats-box {
      width: 95%; margin: 0 auto 22px;
      background: rgba(30,41,59,0.6);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(251,191,36,0.4);
      border-radius: 16px; padding: 22px 30px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.3);
    }
    .stats-row { display: flex; justify-content: center; align-items: center; gap: 40px; }
    .stats-row + .stats-row { margin-top: 18px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.1); }
    .stat-item { text-align: center; min-width: 170px; }
    .stat-label { font-size: 12px; font-weight: 600; letter-spacing: 3px; color: rgba(255,255,255,0.4); margin-bottom: 6px; }
    .stat-value { font-size: 38px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
    .stat-value.white { color: white; }
    .stat-value.green { color: #22c55e; }
    .stat-divider { width: 1px; height: 45px; background: rgba(255,255,255,0.15); }

    .chart-header { text-align: center; margin-bottom: 8px; }
    .chart-label { font-size: 20px; font-weight: 800; letter-spacing: 5px; color: rgba(255,255,255,0.7); margin-bottom: 5px; }
    .chart-date-range { font-size: 26px; font-weight: 800; letter-spacing: 3px; color: #fbbf24; }

    .chart-container { margin: 0 10px; height: 680px; }
    .chart-area {
      position: relative; background: #0d1117;
      border-radius: 12px; border: 2px solid rgba(255,255,255,0.15);
      overflow: visible; height: 620px; margin-bottom: 40px;
    }
    .y-axis-label {
      position: absolute; left: 12px;
      font-size: 14px; font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.8); transform: translateY(50%);
    }
    .h-grid-line { position: absolute; left: 70px; right: 15px; height: 1px; background: rgba(255,255,255,0.1); }
    .trend-line { position: absolute; left: 75px; right: 20px; bottom: 40px; top: 40px; z-index: 1; }
    .trend-line svg { width: 100%; height: 100%; }

    .candlesticks {
      position: absolute; left: 75px; right: 20px; bottom: 40px; top: 40px;
      display: flex; justify-content: space-around; align-items: flex-end; z-index: 5;
    }
    .candle-wrapper { display: flex; flex-direction: column; align-items: center; width: 100px; position: relative; height: 100%; }
    .candle { position: relative; width: 100%; height: 100%; }
    .body { width: 55px; border-radius: 4px; position: absolute; left: 50%; transform: translateX(-50%); min-height: 10px; }
    .body.green { background: linear-gradient(180deg, #3fb950 0%, #2d8a4e 100%); box-shadow: 0 4px 15px rgba(34,197,94,0.4); }
    .body.red { background: linear-gradient(180deg, #f85149 0%, #c0392b 100%); box-shadow: 0 4px 15px rgba(239,68,68,0.4); }
    .body.flat { background: rgba(255,255,255,0.2); height: 4px !important; }
    .pl-label {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-size: 15px; font-weight: 800; font-family: 'JetBrains Mono', monospace;
      white-space: nowrap; z-index: 10; padding: 4px 8px; border-radius: 6px;
    }
    .pl-label.positive { color: #22c55e; background: rgba(34,197,94,0.2); }
    .pl-label.negative { color: #ef4444; background: rgba(239,68,68,0.2); }
    .pl-label.flat { color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.1); }
    .candle-date {
      position: absolute; bottom: -35px; left: 50%; transform: translateX(-50%);
      font-size: 14px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.9);
    }

    .footer { position: absolute; bottom: 25px; left: 0; right: 0; text-align: center; z-index: 10; }
    .logo { width: 70px; height: 70px; margin: 0 auto 15px; }
    .logo img { width: 100%; height: 100%; object-fit: contain; }
    .website { font-size: 16px; font-weight: 700; letter-spacing: 5px; color: white; }
  </style>
</head>
<body>

           Mar 17: 45215.52→45118.76, -$97 (red)

      <div class="chart-container">

              <polyline fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" points="665,320 786,502" />
            </svg>
          </div>

          <div class="candlesticks">
            <div class="candle-wrapper"><div class="candle"><div class="body red" style="bottom: 431px; height: 58px;"></div><div class="pl-label negative" style="bottom: 407px;">-$97</div></div><div class="candle-date">3/17</div></div>

            <div class="candle-wrapper"><div class="candle"><div class="body green" style="bottom: 244px; height: 276px;"></div><div class="pl-label positive" style="bottom: 534px;">+$459</div></div><div class="candle-date">3/19</div></div>
            <div class="candle-wrapper"><div class="candle"><div class="body red" style="bottom: 220px; height: 300px;"></div><div class="pl-label negative" style="bottom: 196px;">-$500</div></div><div class="candle-date">3/20</div></div>

            <div class="candle-wrapper"><div class="candle"><div class="body red" style="bottom: 38px; height: 182px;"></div><div class="pl-label negative" style="bottom: 14px;">-$304</div></div><div class="candle-date">3/23</div></div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="logo"><img src="https://deptofgambling.com/logo.png" alt="DoG"></div>
      <div class="website">DEPTOFGAMBLING.COM</div>
    </div>
  </div>
</body>
</html>
