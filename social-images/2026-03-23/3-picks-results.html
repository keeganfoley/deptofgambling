<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Picks Results - MARCH 23</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; }

    .container {
      width: 1080px;
      height: 1350px;
      padding: 40px 45px 100px;
      position: relative;
      background: linear-gradient(180deg, #4a7cb8 0%, #3a5a8a 50%, #1a2d4a 100%);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .grid-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.10) 1px, transparent 1px);
      background-size: 45px 45px;
    }

    .side-bars {
      position: absolute;
      top: 80px; bottom: 80px;
      width: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .side-bars.left { left: 12px; }
    .side-bars.right { right: 12px; }
    .side-bar { width: 100%; height: 40px; border-radius: 6px; opacity: 0.6; }
    .side-bar.red { background: #c0392b; }
    .side-bar.green { background: #2d8a4e; }

    .content { position: relative; z-index: 1; display: flex; flex-direction: column; flex: 1; }

    .header { text-align: center; margin-bottom: 6px; }
    .date {
      font-size: 50px; font-weight: 900; letter-spacing: 5px;
      color: #fbbf24;
      text-decoration: underline;
      text-underline-offset: 10px;
      text-decoration-thickness: 4px;
    }
    .round-label {
      font-size: 12px; font-weight: 700; letter-spacing: 6px;
      color: rgba(255,255,255,0.45);
      margin-top: 2px;
    }

    .hero-stats {
      display: flex; justify-content: center; align-items: center;
      gap: 18px; margin-bottom: 8px;
    }
    .side-stat {
      text-align: center;
      background: rgba(30,41,59,0.8);
      border-radius: 12px; padding: 8px 22px;
      border: 2px solid rgba(239,68,68,0.6);
      min-width: 105px;
    }
    .side-stat-label {
      font-size: 11px; font-weight: 700; letter-spacing: 3px;
      color: rgba(255,255,255,0.5); margin-bottom: 3px;
    }
    .side-stat-value {
      font-size: 34px; font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      color: #ef4444;
    }
    .big-profit-box {
      background: rgba(15,30,50,0.95);
      border-radius: 16px; padding: 10px 42px 14px;
      border: 4px solid #ef4444;
      box-shadow: 0 0 30px rgba(239,68,68,0.15), 0 8px 40px rgba(0,0,0,0.5);
    }
    .big-profit-label {
      font-size: 13px; font-weight: 800; letter-spacing: 5px;
      color: #ef4444; text-align: center; margin-bottom: 2px;
    }
    .big-profit {
      font-size: 66px; font-weight: 900;
      font-family: 'JetBrains Mono', monospace;
      color: #ef4444; line-height: 1;
    }

    .results-list {
      display: flex; flex-direction: column;
      gap: 7px; flex: 1; justify-content: space-between;
    }

    .result-row {
      display: flex; align-items: center;
      background: rgba(30,41,59,0.85);
      backdrop-filter: blur(10px);
      border-radius: 14px; padding: 8px 16px;
      border: 3px solid #ef4444;
      box-shadow: 0 4px 20px rgba(239,68,68,0.2);
      gap: 12px; flex: 1; max-height: 115px;
      position: relative;
    }
    .result-row.win {
      border-color: #22c55e;
      box-shadow: 0 4px 20px rgba(34,197,94,0.2);
    }

    .team-logo {
      width: 80px; height: 80px; flex-shrink: 0;
      background: rgba(255,255,255,0.1);
      border-radius: 10px; padding: 5px;
      display: flex; align-items: center; justify-content: center;
    }
    .team-logo img { width: 100%; height: 100%; object-fit: contain; }

    .team-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
    .team-name { font-size: 36px; font-weight: 900; color: white; line-height: 1; letter-spacing: 2px; }
    .team-line {
      font-size: 20px; font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.65);
    }

    .fund-badge {
      padding: 6px 12px; border-radius: 8px;
      font-size: 13px; font-weight: 800; letter-spacing: 2px; color: white;
    }
    .fund-badge.sharp { background: rgba(34,197,94,0.35); border: 2px solid #22c55e; color: #22c55e; }
    .fund-badge.vector { background: rgba(156,163,175,0.35); border: 2px solid #9ca3af; color: #9ca3af; }
    .fund-badge.catalyst { background: rgba(192,132,252,0.35); border: 2px solid #c084fc; color: #c084fc; }
    .fund-badge.contra { background: rgba(251,146,22,0.35); border: 2px solid #fb923c; color: #fb923c; }

    .profit-amount {
      font-size: 32px; font-weight: 900;
      font-family: 'JetBrains Mono', monospace;
      color: #ef4444; text-align: center; min-width: 100px;
    }
    .profit-amount.green { color: #22c55e; }

    .result-icon {
      width: 44px; height: 44px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900; color: white; flex-shrink: 0;
      background: linear-gradient(135deg, #c0392b 0%, #ef4444 100%);
      box-shadow: 0 6px 20px rgba(239,68,68,0.4);
    }
    .result-icon.win {
      background: linear-gradient(135deg, #16a34a 0%, #22c55e 100%);
      box-shadow: 0 6px 20px rgba(34,197,94,0.4);
    }

    .footer {
      position: absolute; bottom: 12px; left: 0; right: 0;
      text-align: center; z-index: 10;
    }
    .logo { width: 42px; height: 42px; margin: 0 auto 4px; }
    .logo img { width: 100%; height: 100%; object-fit: contain; }
    .website { font-size: 13px; font-weight: 700; letter-spacing: 6px; color: white; }
  </style>
</head>
<body>

</body>
</html>
